<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>X検索ツール</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>X検索ツール</h1>

<div class="grid">

<div>

<h3>キーワード</h3>

<label>すべての単語</label>
<input id="keyword">

<label>完全一致</label>
<input id="exact">

<label>OR検索</label>
<input id="or">

<label>除外</label>
<input id="exclude">

</div>

<div>

<h3>ユーザー</h3>

<label>投稿者</label>
<input id="user">

<label>ハッシュタグ</label>
<input id="hashtag">

</div>

<div>

<h3>期間</h3>

<label>開始</label>
<input type="date" id="since">

<label>終了</label>
<input type="date" id="until">

</div>

<div>

<h3>エンゲージメント</h3>

<label>いいね</label>
<input type="number" id="like">

<label>RT</label>
<input type="number" id="rt">

<label>リプ</label>
<input type="number" id="replyCount">

</div>

<div>

<h3>コンテンツ</h3>
  
<div class="checkboxRow">
<label><input type="checkbox" id="image"> 画像</label>
<label><input type="checkbox" id="video"> 動画</label>
<label><input type="checkbox" id="link"> リンク</label>
<label><input type="checkbox" id="noRT"> リツイート除外</label>

</div>

</div>

<div class="buttons">

<button onclick="searchX()">X検索</button>
<button onclick="copyQuery()">コピー</button>
<button onclick="downloadQuery()">URL保存</button>
<button onclick="analyzeGPT()">ChatGPT分析</button>
<button onclick="toggleDark()">ダークモード</button>

</div>

<h2>生成された検索クエリ</h2>

<div id="queryBox"></div>

<h2>検索履歴</h2>
<button onclick="clearHistory()">履歴をすべて削除</button>
<ul id="history"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
