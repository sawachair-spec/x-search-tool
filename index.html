<!DOCTYPE html>  
<html lang="ja">  
<head>  
<meta charset="UTF-8">  
<title>X検索ツール</title>  
<link rel="stylesheet" href="style.css">  
</head>  
  
<body>  
  
<div class="container">  
  
<h1>X検索ツール</h1>  
  
<div class="grid">  
  
<div>  
  
<label>ユーザー</label>  
<input id="user">  
  
<label>キーワード</label>  
<input id="keyword">  
  
<label>完全一致</label>  
<input id="exact">  
  
<label>除外</label>  
<input id="exclude">  
  
<label>OR検索</label>  
<input id="or">  
  
<label>ハッシュタグ</label>  
<input id="hashtag">  
  
</div>  
  
<div>  
  
<label>いいね数</label>  
<input id="like" type="number">  
  
<label>RT数</label>  
<input id="rt" type="number">  
  
<label>リプ数</label>  
<input id="replyCount" type="number">  
  
<label>開始日</label>  
<input id="since" type="date">  
  
<label>終了日</label>  
<input id="until" type="date">  
  
</div>  
  
</div>  
  
<div class="buttons">  
  
<button onclick="searchX()">X検索</button>  
<button onclick="copyQuery()">コピー</button>  
<button onclick="downloadQuery()">URL保存</button>  
<button onclick="analyzeGPT()">ChatGPT分析</button>  
<button onclick="toggleDark()">ダークモード</button>  
  
</div>  

<h2>生成された検索クエリ</h2>

<div id="queryBox"></div>
  
<h2>検索履歴</h2>  
  
<ul id="history"></ul>  
  
</div>  
  
<script src="script.js"></script>  
  
</body>  
</html>
