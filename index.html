<h1>X検索ツール</h1>

<div class="grid">

<div>

<h3>キーワード</h3>

<label>すべての単語</label>
<input id="keyword">

<label>完全一致</label>
<input id="exact">

<label>OR検索</label>
<input id="or">

<label>除外</label>
<input id="exclude">

</div>


<div>

<h3>ユーザー</h3>

<label>投稿者</label>
<input id="user">

<label>ハッシュタグ</label>
<input id="hashtag">

</div>


<div>

<h3>期間</h3>

<label>開始</label>
<input type="date" id="since">

<label>終了</label>
<input type="date" id="until">

</div>


<div>

<h3>エンゲージメント</h3>

<label>いいね</label>
<input type="number" id="like">

<label>RT</label>
<input type="number" id="rt">

<label>リプ</label>
<input type="number" id="replyCount">

</div>


<div>

<h3>コンテンツ</h3>

<label><input type="checkbox" id="image">画像</label>

<label><input type="checkbox" id="video">動画</label>

<label><input type="checkbox" id="link">リンク</label>

<label><input type="checkbox" id="noRT">リツイート除外</label>

</div>

</div>
